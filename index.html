<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>運動紀錄系統 v6</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f4f6fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--border:#dbe2ef;--shadow:0 8px 24px rgba(15,23,42,.08);--radius:16px}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:780px;margin:0 auto;padding:14px 14px 96px}.header{position:sticky;top:0;background:rgba(244,246,251,.94);backdrop-filter:blur(10px);z-index:20;padding-bottom:10px}.title{font-size:22px;font-weight:800;margin:0;padding:8px 2px 8px}
    .card{background:var(--card);border-radius:var(--radius);padding:14px;margin-top:12px;box-shadow:var(--shadow)} .card h2{margin:0 0 10px;font-size:18px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:10px}.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:700}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:16px;background:#fff;min-height:46px} textarea{min-height:78px;resize:vertical}
    .date-wrap{width:85%}.num-wrap{display:grid;grid-template-columns:54px 1fr 54px;gap:8px;align-items:center}.num-btn{height:46px;border:0;border-radius:12px;background:#eef3ff;color:#24468f;font-size:24px;font-weight:800}
    .btn{border:0;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:800;cursor:pointer}.primary{background:var(--primary);color:#fff}.secondary{background:#e8eef9;color:#24468f}.tiny{padding:8px 10px;font-size:13px;background:#eff4ff;color:#23408e;border-radius:10px;border:0}
    .actions{display:flex;gap:10px;flex-wrap:wrap}.record-list{display:grid;gap:10px}.record-item{border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff}.record-title{font-weight:800;margin-bottom:6px}.record-meta{font-size:13px;color:var(--muted);line-height:1.6}.record-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.summary-card{background:#f8fbff;border:1px solid #e0e9f8;border-radius:14px;padding:12px}.summary-card .label{font-size:12px;color:var(--muted)}.summary-card .value{font-size:22px;font-weight:800;margin-top:6px}
    .panel{display:none}.panel.active{display:block}.bottom-nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);z-index:30;padding-bottom:env(safe-area-inset-bottom)}
    .tab-btn{border:0;background:#fff;padding:10px 4px 12px;font-size:13px;font-weight:800;color:#667085}.tab-btn.active{color:var(--primary)}.hidden{display:none!important}.overlay{position:fixed;inset:0;background:rgba(15,23,42,.36);display:none;align-items:center;justify-content:center;z-index:100}.overlay.show{display:flex}.overlay-box{background:#fff;padding:18px 22px;border-radius:16px;font-weight:800;box-shadow:var(--shadow)}
    .range-btns{display:flex;gap:8px;flex-wrap:wrap}.range-btn{border:0;border-radius:999px;padding:10px 12px;font-weight:800;background:#e7eefc;color:#24468f}.range-btn.active{background:var(--primary);color:#fff}.footer-link{text-align:right;margin-top:10px}.footer-link a{font-size:12px;color:var(--muted);text-decoration:none}
    canvas{width:100%!important;max-height:280px!important}.hint{font-size:12px;color:var(--muted)}
    @media (max-width:560px){.row,.summary-grid{grid-template-columns:1fr}.app{padding-bottom:104px}}
  </style>
</head>
<body>
<div class="app">
  <div class="header"><h1 class="title">運動紀錄系統 v6</h1></div>

  <section id="panel-body" class="panel active">
    <div class="card">
      <h2>體態紀錄</h2>
      <div class="row">
        <div class="field date-wrap"><label>日期</label><input type="date" id="bodyDate"></div>
        <div class="field"><label>時段</label><select id="bodyTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div>
      </div>
      <div class="field"><label>體重（必填）</label><input inputmode="decimal" id="bodyWeight"></div>
      <div class="field"><label>體脂肪</label><input inputmode="decimal" id="bodyFat"></div>
      <div class="field"><label>腰圍</label><input inputmode="decimal" id="bodyWaist"></div>
      <div class="field"><label>備註</label><textarea id="bodyNote"></textarea></div>
      <div class="actions"><button class="btn primary" id="saveBodyBtn">儲存體態紀錄</button><button class="btn secondary hidden" id="cancelBodyEditBtn">取消修改</button></div>
    </div>
    <div class="card"><h2>最近體態紀錄</h2><div id="bodyRecords" class="record-list"></div></div>
  </section>

  <section id="panel-run" class="panel">
    <div class="card">
      <h2>跑步紀錄</h2>
      <div class="row">
        <div class="field date-wrap"><label>日期</label><input type="date" id="runDate"></div>
        <div class="field"><label>時段</label><select id="runTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div>
      </div>
      <div class="field"><label>跑步分鐘數</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runMinutes" data-step="-1">−</button><input inputmode="numeric" id="runMinutes"><button class="num-btn hold-btn" data-target="runMinutes" data-step="1">＋</button></div></div>
      <div class="field"><label>跑步機速度（km/h）</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runSpeed" data-step="-0.1">−</button><input inputmode="decimal" id="runSpeed"><button class="num-btn hold-btn" data-target="runSpeed" data-step="0.1">＋</button></div></div>
      <div class="field"><label>斜度</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runIncline" data-step="-0.5">−</button><input inputmode="decimal" id="runIncline"><button class="num-btn hold-btn" data-target="runIncline" data-step="0.5">＋</button></div></div>
      <div class="field"><label>距離（留白則自動推算）</label><input inputmode="decimal" id="runDistance"></div>
      <div class="field"><label>備註</label><textarea id="runNote"></textarea></div>
      <div class="actions"><button class="btn primary" id="saveRunBtn">儲存跑步紀錄</button><button class="btn secondary hidden" id="cancelRunEditBtn">取消修改</button></div>
    </div>
    <div class="card"><h2>最近跑步紀錄</h2><div id="runRecords" class="record-list"></div></div>
  </section>

  <section id="panel-strength" class="panel">
    <div class="card">
      <h2>重訓紀錄</h2>
      <div class="row">
        <div class="field date-wrap"><label>日期</label><input type="date" id="strengthDate"></div>
        <div class="field"><label>時段</label><select id="strengthTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div>
      </div>
      <div class="field"><label>動作名稱</label><input list="exerciseOptions" id="strengthExercise"><datalist id="exerciseOptions"></datalist></div>
      <div class="field"><label>重量</label><input inputmode="decimal" id="strengthWeight"></div>
      <div class="field"><label>次數</label><input inputmode="decimal" id="strengthReps"></div>
      <div class="field"><label>秒數</label><input inputmode="decimal" id="strengthSeconds"></div>
      <div class="field"><label>組數（必填）</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="strengthSets" data-step="-1">−</button><input inputmode="numeric" id="strengthSets"><button class="num-btn hold-btn" data-target="strengthSets" data-step="1">＋</button></div></div>
      <div class="field"><label>備註</label><textarea id="strengthNote"></textarea></div>
      <div class="actions"><button class="btn primary" id="saveStrengthBtn">儲存重訓紀錄</button><button class="btn secondary hidden" id="cancelStrengthEditBtn">取消修改</button></div>
    </div>
    <div class="card"><h2>最近重訓紀錄</h2><div id="strengthRecords" class="record-list"></div></div>
  </section>

  <section id="panel-stats" class="panel">
    <div class="card"><h2>統計摘要</h2><div class="range-btns"><button class="range-btn active" data-range="1m">近1個月</button><button class="range-btn" data-range="3m">近3個月</button><button class="range-btn" data-range="6m">近6個月</button><button class="range-btn" data-range="1y">近1年</button><button class="range-btn" data-range="all">全部</button></div></div>
    <div class="card"><h2>體態摘要</h2><div id="bodySummary" class="summary-grid"></div></div>
    <div class="card"><h2>跑步摘要</h2><div id="runSummary" class="summary-grid"></div></div>
    <div class="card"><h2>體重／體脂／腰圍圖</h2><canvas id="bodyChart"></canvas></div>
    <div class="card"><h2>跑步圖</h2><canvas id="runChart"></canvas></div>
    <div class="card"><h2>重訓摘要</h2><div id="strengthSummary"></div></div>
    <div class="footer-link"><a id="sheetLink" href="#" target="_blank" rel="noopener">後台 Sheet</a></div>
  </section>
</div>

<div class="bottom-nav">
  <button class="tab-btn active" data-tab="body">體重</button>
  <button class="tab-btn" data-tab="run">跑步</button>
  <button class="tab-btn" data-tab="strength">重訓</button>
  <button class="tab-btn" data-tab="stats">統計</button>
</div>
<div id="overlay" class="overlay"><div class="overlay-box">儲存中...請稍後</div></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwMDGa7Q_oF8YokYuo4ItF4XGUknCGqeXpq-ttDAbLnPUC0t7BbAHkHFhj-4-SpXdJtCA/exec';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1EqAbQKvkHtlGk81AlXaXHrfmsf0cHV3v2jZ_erTF1sA/edit?gid=1609334560#gid=1609334560';
const state = { initData:null, currentRange:'1m', editing:{body:null,run:null,strength:null}, charts:{} };
const $ = id => document.getElementById(id);
const localDateValue = ()=>{ const d=new Date(); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; };
const twDateText = v => { if(!v) return ''; if(/^\d{4}\/\d{2}\/\d{2}$/.test(v)) return v; const d=new Date(v); if(isNaN(d)) return String(v).slice(0,10).replace(/-/g,'/'); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}/${m}/${day}`; };
const shortDateText = v => { const s=twDateText(v); return s ? s.slice(5) : ''; };
const fmt1 = v => (v === '' || v === null || v === undefined || Number.isNaN(Number(v))) ? '—' : Number(v).toFixed(1);
function currentTimeSlot(){const h=new Date().getHours(); if(h>=5&&h<12)return'上午'; if(h>=12&&h<18)return'下午'; return'晚上';}
function setOverlay(show){ $('overlay').classList.toggle('show', !!show); }
async function postData(payload){ const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)}); const data=await res.json(); if(!data.ok) throw new Error(data.message||'發生錯誤'); return data; }
function smartParse(value, mode){ const str=String(value||'').trim(); if(!str) return ''; if(str.includes('.')) return Number(Number(str).toFixed(1)); if(!/^\d+$/.test(str)) return Number(Number(str).toFixed(1)); if(mode==='bodyWeight'||mode==='waist'){ if(str.length>=3 && str[0]==='1') return Number(str); if(str.length>=3) return Number((Number(str)/10).toFixed(1)); return Number(str);} if(mode==='bodyFat'||mode==='weight'){ if(str.length>=3) return Number((Number(str)/10).toFixed(1)); return Number(str);} return Number(str); }
function setupDates(){ ['bodyDate','runDate','strengthDate'].forEach(id=>$(id).value=localDateValue()); ['bodyTimeSlot','runTimeSlot','strengthTimeSlot'].forEach(id=>$(id).value=currentTimeSlot()); }
function setupTabs(){ document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click', ()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===btn.dataset.tab)); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); $('panel-'+btn.dataset.tab).classList.add('active'); if(btn.dataset.tab==='stats') loadStats(state.currentRange); })); }
function setupRanges(){ document.querySelectorAll('.range-btn').forEach(btn=>btn.addEventListener('click', ()=>{ document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); state.currentRange=btn.dataset.range; loadStats(btn.dataset.range);})); }
function setupHold(){ document.querySelectorAll('.hold-btn').forEach(btn=>{ let interval=null; const apply=()=>adjustInput(btn.dataset.target, Number(btn.dataset.step)); const start=e=>{ e.preventDefault(); apply(); interval=setInterval(apply, 120);}; const stop=()=>{ if(interval) clearInterval(interval); interval=null;}; btn.addEventListener('mousedown',start); btn.addEventListener('touchstart',start,{passive:false}); ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>btn.addEventListener(ev,stop)); }); }
function adjustInput(id, step){ const input=$(id); let value=Number(input.value||0); if(!Number.isFinite(value)) value=0; value+=step; if(value<0)value=0; const decimals=String(step).includes('.')?String(step).split('.')[1].length:0; input.value=value.toFixed(decimals); }
function loadLocal(){ try{return JSON.parse(localStorage.getItem('sports_v6_cache')||'{}');}catch{return{};} }
function saveLocal(cache){ localStorage.setItem('sports_v6_cache', JSON.stringify(cache)); }
function applyInit(data){ state.initData=data; $('sheetLink').href = data.sheetUrl || SHEET_URL; const cache=loadLocal(); $('bodyWeight').value=''; $('bodyFat').value=''; $('bodyWaist').value=''; if((cache.run||data.latest.run)){ const r=cache.run||data.latest.run; $('runMinutes').value=r.minutes??''; $('runSpeed').value=r.speed??''; $('runIncline').value=r.incline??''; $('runDistance').value=r.distance??''; } renderExerciseOptions(data.exercises||[]); }
function renderExerciseOptions(items){ const dl=$('exerciseOptions'); dl.innerHTML=''; items.forEach(it=>{ const op=document.createElement('option'); op.value=it.name; dl.appendChild(op); }); }
function bindExercisePrefill(){ ['change','blur'].forEach(ev=>$('strengthExercise').addEventListener(ev, ()=>{ const name=$('strengthExercise').value.trim(); if(!name||!state.initData) return; const cache=loadLocal(); const data=(cache.strengthByExercise||{})[name] || (state.initData.latest.strengthByExercise||{})[name]; $('strengthWeight').value=data?.weight ?? ''; $('strengthReps').value=data?.reps ?? ''; $('strengthSeconds').value=data?.seconds ?? ''; $('strengthSets').value=data?.sets ?? ''; })); }
function bindActions(){ $('saveBodyBtn').onclick=saveBody; $('saveRunBtn').onclick=saveRun; $('saveStrengthBtn').onclick=saveStrength; $('cancelBodyEditBtn').onclick=()=>resetBody(); $('cancelRunEditBtn').onclick=()=>resetRun(); $('cancelStrengthEditBtn').onclick=()=>resetStrength(); }
async function init(){ setupDates(); setupTabs(); setupRanges(); setupHold(); bindExercisePrefill(); bindActions(); const data=await postData({action:'init'}); applyInit(data); await Promise.all([loadRecent('body'), loadRecent('run'), loadRecent('strength')]); $('sheetLink').href=SHEET_URL; }
function normalizeDateForGas(v){ return v ? v.replace(/-/g,'/') : ''; }
async function saveBody(){ try{ setOverlay(true); const payload={action:'saveBody', id:state.editing.body?.id||'', date:normalizeDateForGas($('bodyDate').value), timeSlot:$('bodyTimeSlot').value, weight:smartParse($('bodyWeight').value,'bodyWeight'), bodyFat:smartParse($('bodyFat').value,'bodyFat'), waist:smartParse($('bodyWaist').value,'waist'), note:$('bodyNote').value.trim()}; await postData(payload); resetBody(); await reloadAll(); }catch(err){ alert(err.message);} finally{ setOverlay(false);} }
async function saveRun(){ try{ setOverlay(true); const payload={action:'saveRun', id:state.editing.run?.id||'', date:normalizeDateForGas($('runDate').value), timeSlot:$('runTimeSlot').value, minutes:$('runMinutes').value, speed:$('runSpeed').value, incline:$('runIncline').value, distance:$('runDistance').value, note:$('runNote').value.trim()}; await postData(payload); const cache=loadLocal(); cache.run={minutes:$('runMinutes').value,speed:$('runSpeed').value,incline:$('runIncline').value,distance:$('runDistance').value}; saveLocal(cache); resetRun(false); await reloadAll(); }catch(err){ alert(err.message);} finally{ setOverlay(false);} }
async function saveStrength(){ try{ setOverlay(true); const payload={action:'saveStrength', id:state.editing.strength?.id||'', date:normalizeDateForGas($('strengthDate').value), timeSlot:$('strengthTimeSlot').value, exercise:$('strengthExercise').value.trim(), weight:smartParse($('strengthWeight').value,'weight'), reps:smartParse($('strengthReps').value,'bodyFat'), seconds:smartParse($('strengthSeconds').value,'bodyFat'), sets:$('strengthSets').value, note:$('strengthNote').value.trim()}; await postData(payload); const cache=loadLocal(); cache.strengthByExercise=cache.strengthByExercise||{}; cache.strengthByExercise[payload.exercise]={weight:payload.weight,reps:payload.reps,seconds:payload.seconds,sets:payload.sets}; saveLocal(cache); resetStrength(); await reloadAll(); }catch(err){ alert(err.message);} finally{ setOverlay(false);} }
function resetBody(){ state.editing.body=null; $('cancelBodyEditBtn').classList.add('hidden'); setupDates(); $('bodyWeight').value=''; $('bodyFat').value=''; $('bodyWaist').value=''; $('bodyNote').value=''; }
function resetRun(clearAll=true){ state.editing.run=null; $('cancelRunEditBtn').classList.add('hidden'); $('runDate').value=localDateValue(); $('runTimeSlot').value=currentTimeSlot(); $('runNote').value=''; if(clearAll){ $('runMinutes').value=''; $('runSpeed').value=''; $('runIncline').value=''; $('runDistance').value=''; } }
function resetStrength(){ state.editing.strength=null; $('cancelStrengthEditBtn').classList.add('hidden'); $('strengthDate').value=localDateValue(); $('strengthTimeSlot').value=currentTimeSlot(); $('strengthExercise').value=''; $('strengthWeight').value=''; $('strengthReps').value=''; $('strengthSeconds').value=''; $('strengthSets').value=''; $('strengthNote').value=''; }
async function loadRecent(type){ const res=await postData({action:'getRecentRecords',recordType:type,limit:10}); if(type==='body') renderBodyRecords(res.rows||[]); if(type==='run') renderRunRecords(res.rows||[]); if(type==='strength') renderStrengthRecords(res.rows||[]); }
function renderBodyRecords(rows){ const box=$('bodyRecords'); box.innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>'; rows.forEach(r=>{ const div=document.createElement('div'); div.className='record-item'; div.innerHTML=`<div class="record-title">${fmt1(r.weight)} kg</div><div class="record-meta">${twDateText(r.date)}｜${r.timeSlot}<br>體脂：${r.bodyFat===''?'—':fmt1(r.bodyFat)+' %'}｜腰圍：${r.waist===''?'—':fmt1(r.waist)}</div><div class="record-actions"><button class="tiny" onclick="editRecord('body','${r.id}')">修改</button><button class="tiny" onclick="deleteRecord('body','${r.id}')">刪除</button></div>`; box.appendChild(div); }); }
function renderRunRecords(rows){ const box=$('runRecords'); box.innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>'; rows.forEach(r=>{ const div=document.createElement('div'); div.className='record-item'; div.innerHTML=`<div class="record-title">${fmt1(r.minutes)} 分鐘｜速度 ${fmt1(r.speed)}</div><div class="record-meta">${twDateText(r.date)}｜${r.timeSlot}<br>斜度：${fmt1(r.incline)}｜距離：${fmt1(r.distance)}</div><div class="record-actions"><button class="tiny" onclick="editRecord('run','${r.id}')">修改</button><button class="tiny" onclick="deleteRecord('run','${r.id}')">刪除</button></div>`; box.appendChild(div); }); }
function renderStrengthRecords(rows){ const box=$('strengthRecords'); box.innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>'; rows.forEach(r=>{ const parts=[]; if(r.weight!=='') parts.push(`重量：${fmt1(r.weight)}`); if(r.reps!=='') parts.push(`次數：${fmt1(r.reps)}`); if(r.seconds!=='') parts.push(`秒數：${fmt1(r.seconds)}`); parts.push(`組數：${fmt1(r.sets)}`); const div=document.createElement('div'); div.className='record-item'; div.innerHTML=`<div class="record-title">${r.exercise}</div><div class="record-meta">${twDateText(r.date)}｜${r.timeSlot}<br>${parts.join('｜')}</div><div class="record-actions"><button class="tiny" onclick="editRecord('strength','${r.id}')">修改</button><button class="tiny" onclick="deleteRecord('strength','${r.id}')">刪除</button></div>`; box.appendChild(div); }); }
async function editRecord(type,id){ const res=await postData({action:'getRecentRecords',recordType:type,limit:30}); const row=(res.rows||[]).find(r=>String(r.id)===String(id)); if(!row) return alert('找不到資料'); if(type==='body'){ state.editing.body=row; $('bodyDate').value=twDateText(row.date).replace(/\//g,'-'); $('bodyTimeSlot').value=row.timeSlot; $('bodyWeight').value=fmt1(row.weight)==='—'?'':fmt1(row.weight); $('bodyFat').value=row.bodyFat===''?'':fmt1(row.bodyFat); $('bodyWaist').value=row.waist===''?'':fmt1(row.waist); $('bodyNote').value=row.note||''; $('cancelBodyEditBtn').classList.remove('hidden'); document.querySelector('[data-tab="body"]').click(); }
 if(type==='run'){ state.editing.run=row; $('runDate').value=twDateText(row.date).replace(/\//g,'-'); $('runTimeSlot').value=row.timeSlot; $('runMinutes').value=row.minutes===''?'':fmt1(row.minutes); $('runSpeed').value=row.speed===''?'':fmt1(row.speed); $('runIncline').value=row.incline===''?'':fmt1(row.incline); $('runDistance').value=row.distance===''?'':fmt1(row.distance); $('runNote').value=row.note||''; $('cancelRunEditBtn').classList.remove('hidden'); document.querySelectorAll('[data-tab="run"]').forEach(b=>b.click()); }
 if(type==='strength'){ state.editing.strength=row; $('strengthDate').value=twDateText(row.date).replace(/\//g,'-'); $('strengthTimeSlot').value=row.timeSlot; $('strengthExercise').value=row.exercise||''; $('strengthWeight').value=row.weight===''?'':fmt1(row.weight); $('strengthReps').value=row.reps===''?'':fmt1(row.reps); $('strengthSeconds').value=row.seconds===''?'':fmt1(row.seconds); $('strengthSets').value=row.sets===''?'':fmt1(row.sets); $('strengthNote').value=row.note||''; $('cancelStrengthEditBtn').classList.remove('hidden'); document.querySelectorAll('[data-tab="strength"]').forEach(b=>b.click()); }}
async function deleteRecord(type,id){ if(!confirm('確定要刪除此筆紀錄嗎？')) return; await postData({action:'softDeleteRecord',recordType:type,id}); await reloadAll(); }
async function reloadAll(){ const data=await postData({action:'init'}); applyInit(data); await Promise.all([loadRecent('body'),loadRecent('run'),loadRecent('strength'),loadStats(state.currentRange)]); }
function summaryCard(label,value,unit=''){ return `<div class="summary-card"><div class="label">${label}</div><div class="value">${value===''?'—':fmt1(value)+(unit?` ${unit}`:'')}</div></div>`; }
async function loadStats(range){ const res=await postData({action:'getStats',range}); $('bodySummary').innerHTML=[summaryCard('最近體重',res.body.latestWeight,'kg'),summaryCard('最近體脂',res.body.latestBodyFat,'%'),summaryCard('最近腰圍',res.body.latestWaist,''),summaryCard('平均體重',res.body.avgWeight,'kg'),summaryCard('平均體脂',res.body.avgBodyFat,'%'),summaryCard('體重變化',res.body.changeWeight,'kg')].join(''); $('runSummary').innerHTML=[summaryCard('跑步次數',res.run.count,''),summaryCard('總分鐘數',res.run.totalMinutes,'分'),summaryCard('總距離',res.run.totalDistance,'km'),summaryCard('平均速度',res.run.avgSpeed,'km/h'),summaryCard('平均斜度',res.run.avgIncline,'')].join(''); renderStrengthSummary(res.strength.exercises||[]); renderBodyChart(res.body.trend||[]); renderRunChart(res.run.trend||[]); }
function renderStrengthSummary(rows){ $('strengthSummary').innerHTML = rows.length ? rows.map(r=>`<div class="record-item" style="margin-bottom:10px"><div class="record-title">${r.exercise}</div><div class="record-meta">次數：${r.count}<br>最大重量：${fmt1(r.maxWeight)}<br>總訓練量：${fmt1(r.totalVolume)}<br>總次數：${fmt1(r.totalReps)}<br>總秒數：${fmt1(r.totalSeconds)}</div></div>`).join('') : '<div class="hint">目前沒有資料</div>'; }
function destroyChart(name){ if(state.charts[name]){ state.charts[name].destroy(); state.charts[name]=null; } }
function renderBodyChart(trend){ destroyChart('body'); const ctx=$('bodyChart'); state.charts.body=new Chart(ctx,{type:'line',data:{labels:trend.map(x=>x.date),datasets:[{label:'體重',data:trend.map(x=>x.weight===''?null:Number(x.weight)),spanGaps:true,borderWidth:2},{label:'體脂',data:trend.map(x=>x.bodyFat===''?null:Number(x.bodyFat)),spanGaps:true,borderWidth:2},{label:'腰圍',data:trend.map(x=>x.waist===''?null:Number(x.waist)),spanGaps:true,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true}},scales:{y:{ticks:{callback:v=>Number(v).toFixed(1)}}}}}); }
function renderRunChart(trend){ destroyChart('run'); const ctx=$('runChart'); state.charts.run=new Chart(ctx,{type:'bar',data:{labels:trend.map(x=>x.date),datasets:[{label:'分鐘',data:trend.map(x=>x.minutes===''?null:Number(x.minutes))},{label:'距離',data:trend.map(x=>x.distance===''?null:Number(x.distance))}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:v=>Number(v).toFixed(1)}}}}}); }
init().catch(err=>alert('初始化失敗：'+err.message));
</script>
