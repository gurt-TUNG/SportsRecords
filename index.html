<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>運動紀錄系統 v7</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--border:#dbe3ef;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:18px}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .app{max-width:820px;margin:0 auto;padding:16px 16px 96px}.header{position:sticky;top:0;z-index:20;background:rgba(245,247,251,.95);backdrop-filter:blur(10px);padding:8px 0 12px}
    .title{margin:0;font-size:24px;font-weight:800}.sub{font-size:12px;color:var(--muted);margin-top:2px}.panel{display:none}.panel.active{display:block}
    .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-top:14px;box-shadow:var(--shadow)}.card h2{margin:0 0 12px;font-size:18px}
    .grid-2{display:grid;grid-template-columns:.85fr 1fr;gap:12px}.field{margin-bottom:12px}.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:700}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:16px;background:#fff} textarea{min-height:76px;resize:vertical}
    .num-wrap{display:grid;grid-template-columns:56px 1fr 56px;gap:8px;align-items:center}.num-btn{height:48px;border:0;border-radius:12px;background:#edf2ff;color:#23408e;font-size:24px;font-weight:800}
    .primary-btn,.secondary-btn,.tiny-btn,.range-btn{border:0;border-radius:14px;padding:13px 14px;font-size:15px;font-weight:800;cursor:pointer}.primary-btn{background:var(--primary);color:#fff}.secondary-btn{background:#e8eef9;color:#24468f}
    .tiny-btn{padding:8px 10px;font-size:13px;background:#eff4ff;color:#23408e;border-radius:10px}.range-btn{background:#e7eefc;color:#24468f;padding:10px 12px;border-radius:999px}.range-btn.active{background:var(--primary);color:#fff}
    .actions,.range-btns,.checks{display:flex;gap:10px;flex-wrap:wrap}.hint{font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px}.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .summary-card{background:#f8fbff;border:1px solid #e0e9f8;border-radius:14px;padding:12px}.summary-card .label{font-size:12px;color:var(--muted);margin-bottom:6px}.summary-card .value{font-size:22px;font-weight:800}
    .record-list{display:grid;gap:10px;margin-top:12px}.record-item{border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff}.record-item-title{font-weight:800;margin-bottom:6px}.record-item-meta{font-size:13px;color:var(--muted);line-height:1.6}
    .record-item-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.footer-link{text-align:right;margin-top:10px}.footer-link a{font-size:12px;color:var(--muted);text-decoration:none}
    .msg{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:rgba(17,24,39,.92);color:#fff;padding:12px 16px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:60;max-width:calc(100% - 24px)}.msg.show{opacity:1}
    .hidden{display:none!important}.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,.98);backdrop-filter:blur(12px);border-top:1px solid #dde5f1;display:grid;grid-template-columns:repeat(4,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
    .nav-btn{border:0;background:transparent;padding:8px 4px;border-radius:12px;color:#64748b;font-weight:800;font-size:13px}.nav-btn.active{background:#edf2ff;color:#1d4ed8}.overlay{position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;align-items:center;justify-content:center;z-index:70}.overlay.show{display:flex}
    .overlay-box{background:#fff;padding:20px 22px;border-radius:16px;box-shadow:var(--shadow);font-weight:800}.check-item{font-size:13px;color:#374151} canvas{width:100%!important;height:260px!important}.table-wrap{overflow:auto} table{width:100%;border-collapse:collapse;font-size:14px} th,td{padding:8px;border-bottom:1px solid #e5edf7;text-align:left;white-space:nowrap}
    @media (max-width:520px){.grid-2,.summary-grid{grid-template-columns:1fr}.app{padding:12px 12px 98px}input,select,textarea{font-size:16px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="header"><h1 class="title">運動紀錄系統 v7</h1><div class="sub">台灣時區 / 手機版</div></div>
    <section id="panel-body" class="panel active"><div class="card"><h2>體態紀錄</h2><div class="grid-2"><div class="field"><label>日期</label><input type="date" id="bodyDate"></div><div class="field"><label>時段</label><select id="bodyTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div></div><div class="field"><label>體重（必填）</label><input inputmode="decimal" id="bodyWeight"></div><div class="hint" id="bodyWeightHint"></div><div class="field"><label>體脂肪</label><input inputmode="decimal" id="bodyFat"></div><div class="hint" id="bodyFatHint"></div><div class="field"><label>腰圍</label><input inputmode="decimal" id="bodyWaist"></div><div class="hint" id="bodyWaistHint"></div><div class="field"><label>備註</label><textarea id="bodyNote"></textarea></div><div class="actions"><button class="primary-btn" id="saveBodyBtn">儲存體態紀錄</button><button class="secondary-btn hidden" id="cancelBodyEditBtn">取消修改</button></div></div><div class="card"><h2>最近體態紀錄</h2><div id="bodyRecords" class="record-list"></div></div></section>
    <section id="panel-run" class="panel"><div class="card"><h2>跑步紀錄</h2><div class="grid-2"><div class="field"><label>日期</label><input type="date" id="runDate"></div><div class="field"><label>時段</label><select id="runTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div></div><div class="field"><label>跑步分鐘數</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runMinutes" data-step="-1">−</button><input inputmode="numeric" id="runMinutes"><button class="num-btn hold-btn" data-target="runMinutes" data-step="1">＋</button></div></div><div class="field"><label>跑步機速度（km/h）</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runSpeed" data-step="-0.1">−</button><input inputmode="decimal" id="runSpeed"><button class="num-btn hold-btn" data-target="runSpeed" data-step="0.1">＋</button></div></div><div class="field"><label>斜度</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runIncline" data-step="-0.5">−</button><input inputmode="decimal" id="runIncline"><button class="num-btn hold-btn" data-target="runIncline" data-step="0.5">＋</button></div></div><div class="field"><label>距離（可空白，留白自動推算）</label><input inputmode="decimal" id="runDistance"></div><div class="field"><label>備註</label><textarea id="runNote"></textarea></div><div class="actions"><button class="primary-btn" id="saveRunBtn">儲存跑步紀錄</button><button class="secondary-btn hidden" id="cancelRunEditBtn">取消修改</button></div></div><div class="card"><h2>最近跑步紀錄</h2><div id="runRecords" class="record-list"></div></div></section>
    <section id="panel-strength" class="panel"><div class="card"><h2>重訓紀錄</h2><div class="grid-2"><div class="field"><label>日期</label><input type="date" id="strengthDate"></div><div class="field"><label>時段</label><select id="strengthTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div></div><div class="field"><label>動作名稱</label><select id="strengthExerciseSelect"></select></div><div class="field hidden" id="strengthOtherWrap"><label>其他動作名稱</label><input id="strengthExerciseOther" placeholder="請輸入動作名稱"></div><div class="field"><label>重量</label><input inputmode="decimal" id="strengthWeight"></div><div class="hint" id="strengthWeightHint"></div><div class="field"><label>次數</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="strengthReps" data-step="-1">−</button><input inputmode="numeric" id="strengthReps"><button class="num-btn hold-btn" data-target="strengthReps" data-step="1">＋</button></div></div><div class="field"><label>秒數</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="strengthSeconds" data-step="-1">−</button><input inputmode="numeric" id="strengthSeconds"><button class="num-btn hold-btn" data-target="strengthSeconds" data-step="1">＋</button></div></div><div class="field"><label>組數</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="strengthSets" data-step="-1">−</button><input inputmode="numeric" id="strengthSets"><button class="num-btn hold-btn" data-target="strengthSets" data-step="1">＋</button></div></div><div class="field"><label>備註</label><textarea id="strengthNote"></textarea></div><div class="actions"><button class="primary-btn" id="saveStrengthBtn">儲存重訓紀錄</button><button class="secondary-btn hidden" id="cancelStrengthEditBtn">取消修改</button></div></div><div class="card"><h2>最近重訓紀錄</h2><div id="strengthRecords" class="record-list"></div></div></section>
    <section id="panel-stats" class="panel"><div class="card"><h2>統計摘要</h2><div class="range-btns"><button class="range-btn active" data-range="1m">近1個月</button><button class="range-btn" data-range="3m">近3個月</button><button class="range-btn" data-range="6m">近6個月</button><button class="range-btn" data-range="1y">近1年</button><button class="range-btn" data-range="all">全部</button></div></div><div class="card"><h2>體態摘要</h2><div id="bodySummary" class="summary-grid"></div><div class="checks" style="margin-top:12px"><label class="check-item"><input type="checkbox" id="chkBodyWeight" checked> 體重</label><label class="check-item"><input type="checkbox" id="chkBodyFat" checked> 體脂肪</label><label class="check-item"><input type="checkbox" id="chkBodyWaist" checked> 腰圍</label></div><div style="margin-top:12px"><canvas id="bodyChart"></canvas></div></div><div class="card"><h2>跑步摘要</h2><div id="runSummary" class="summary-grid"></div><div class="checks" style="margin-top:12px"><label class="check-item"><input type="checkbox" id="chkRunMinutes" checked> 分鐘數</label><label class="check-item"><input type="checkbox" id="chkRunSpeed" checked> 速度</label><label class="check-item"><input type="checkbox" id="chkRunIncline" checked> 斜度</label><label class="check-item"><input type="checkbox" id="chkRunDistance" checked> 距離</label></div><div style="margin-top:12px"><canvas id="runChart"></canvas></div></div><div class="card"><h2>重訓摘要</h2><div id="strengthSummaryCards" class="summary-grid"></div><h3>重量型動作</h3><div class="table-wrap"><div id="weightTable"></div></div><h3>次數型動作</h3><div class="table-wrap"><div id="countTable"></div></div><h3>秒數型動作</h3><div class="table-wrap"><div id="secondsTable"></div></div></div><div class="card"><h2>單一動作趨勢</h2><div class="field"><label>選擇動作</label><select id="trendExercise"></select></div><div style="margin-top:12px"><canvas id="strengthTrendChart"></canvas></div></div><div class="footer-link"><a id="sheetLink" href="#" target="_blank" rel="noopener">後台 Sheet</a></div></section>
  </div>
  <div class="bottom-nav"><button class="nav-btn active" data-tab="body">體重</button><button class="nav-btn" data-tab="run">跑步</button><button class="nav-btn" data-tab="strength">重訓</button><button class="nav-btn" data-tab="stats">統計</button></div>
  <div id="overlay" class="overlay"><div class="overlay-box">儲存中...請稍後</div></div><div id="msg" class="msg"></div>
  <script>
    const GAS_URL='https://script.google.com/macros/s/AKfycbwMDGa7Q_oF8YokYuo4ItF4XGUknCGqeXpq-ttDAbLnPUC0t7BbAHkHFhj-4-SpXdJtCA/exec';
    const DEFAULT_SHEET_URL='https://docs.google.com/spreadsheets/d/1EqAbQKvkHtlGk81AlXaXHrfmsf0cHV3v2jZ_erTF1sA/edit?gid=1609334560#gid=1609334560';
    const DEFAULT_EXERCISES=['單雙槓舉腿架-舉腿','單雙槓舉腿架-拉伸','胸部推舉訓練機','三頭肌訓練機','輔助式單雙槓訓練訓練機','坐姿划船訓練機','臀腿訓練機','大腿推蹬訓練機','固定式背部下拉訓練機','大腿內縮訓練機','大腿外展訓練機','腿部伸張訓練機','驅幹旋轉訓練機','腹部緊縮機','壺鈴擺盪','其他'];
    const appState={initData:null,currentRange:'1m',editing:{body:null,run:null,strength:null},charts:{bodyChart:null,runChart:null,strengthTrendChart:null}};
    const $=id=>document.getElementById(id);
    function twDateInputValue(date=new Date()){const tw=new Date(date.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));const y=tw.getFullYear(),m=String(tw.getMonth()+1).padStart(2,'0'),d=String(tw.getDate()).padStart(2,'0');return `${y}-${m}-${d}`;}
    function twDateText(date=new Date()){const tw=new Date(date.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));const y=tw.getFullYear(),m=String(tw.getMonth()+1).padStart(2,'0'),d=String(tw.getDate()).padStart(2,'0');return `${y}/${m}/${d}`;}
    function currentTimeSlot(){const tw=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));const h=tw.getHours();if(h>=5&&h<12)return '上午';if(h>=12&&h<18)return '下午';return '晚上';}
    function formatDisplayDate(dateStr){if(!dateStr)return '';const s=String(dateStr);if(s.includes('T'))return twDateText(new Date(s));return s.replace(/-/g,'/');}
    function mmdd(dateStr){const t=formatDisplayDate(dateStr),p=t.split('/');return p.length>=3?`${String(p[1]).padStart(2,'0')}/${String(p[2]).padStart(2,'0')}`:t;}
    function showMsg(text){const el=$('msg');el.textContent=text;el.classList.add('show');clearTimeout(showMsg.timer);showMsg.timer=setTimeout(()=>el.classList.remove('show'),1800);} function showOverlay(flag){$('overlay').classList.toggle('show',!!flag);}
    async function postData(payload){const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)});const data=await res.json();if(!data.ok) throw new Error(data.message||'發生錯誤');return data;}
    function round1(v){const n=Number(v);if(!Number.isFinite(n)) return '';return (Math.round(n*10)/10).toFixed(1);} function hintText(id,parsed){$(id).textContent=parsed===''?'':`將儲存為 ${round1(parsed)}`;}
    function parseSmart(raw,mode){const s=String(raw??'').trim();if(!s) return '';if(s.includes('.')){const n=Number(s);return Number.isFinite(n)?n:'';}if(!/^\d+$/.test(s)){const n=Number(s);return Number.isFinite(n)?n:'';}if(mode==='bodyWeight'||mode==='waist'){if(s.length<=2) return Number(s);if(s.length===3&&s.startsWith('1')) return Number(s);return Number(s)/10;}if(mode==='bodyFat'||mode==='weight'){if(s.length<=2) return Number(s);return Number(s)/10;}return Number(s);}
    function bindParseHints(){$('bodyWeight').addEventListener('input',()=>hintText('bodyWeightHint',parseSmart($('bodyWeight').value,'bodyWeight')));$('bodyFat').addEventListener('input',()=>hintText('bodyFatHint',parseSmart($('bodyFat').value,'bodyFat')));$('bodyWaist').addEventListener('input',()=>hintText('bodyWaistHint',parseSmart($('bodyWaist').value,'waist')));$('strengthWeight').addEventListener('input',()=>hintText('strengthWeightHint',parseSmart($('strengthWeight').value,'weight')));}
    function setDefaultDates(){$('bodyDate').value=twDateInputValue();$('runDate').value=twDateInputValue();$('strengthDate').value=twDateInputValue();$('bodyTimeSlot').value=currentTimeSlot();$('runTimeSlot').value=currentTimeSlot();$('strengthTimeSlot').value=currentTimeSlot();}
    function loadLocalCache(){try{return JSON.parse(localStorage.getItem('fitness_app_cache')||'{}');}catch{return {};}} function saveLocalCache(cache){localStorage.setItem('fitness_app_cache',JSON.stringify(cache));}
    function adjustInput(id,step){const input=$(id);let v=Number(input.value||0);if(!Number.isFinite(v))v=0;v+=step;if(v<0)v=0;const d=String(step).includes('.')?String(step).split('.')[1].length:0;input.value=v.toFixed(d);}
    function setupHoldButtons(){document.querySelectorAll('.hold-btn').forEach(btn=>{let timer=null;const start=e=>{e.preventDefault();adjustInput(btn.dataset.target,Number(btn.dataset.step));timer=setInterval(()=>adjustInput(btn.dataset.target,Number(btn.dataset.step)),120);};const stop=()=>{if(timer)clearInterval(timer);timer=null;};btn.addEventListener('mousedown',start);btn.addEventListener('touchstart',start,{passive:false});['mouseup','mouseleave','touchend','touchcancel'].forEach(evt=>btn.addEventListener(evt,stop));});}
    function setupTabs(){document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{const tab=btn.dataset.tab;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));$('panel-'+tab).classList.add('active');if(tab==='stats') loadStats(appState.currentRange);if(tab==='body') setTimeout(()=>$('bodyWeight').focus(),50);}));}
    function setupRangeButtons(){document.querySelectorAll('.range-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');appState.currentRange=btn.dataset.range;loadStats(appState.currentRange);}));}
    function setupExerciseSelect(exercises=[]){const sel=$('strengthExerciseSelect');const unique=[...new Set([...(exercises.map(e=>e.name||e)),...DEFAULT_EXERCISES])];sel.innerHTML=unique.map(n=>`<option value="${n}">${n}</option>`).join('');sel.addEventListener('change',()=>{$('strengthOtherWrap').classList.toggle('hidden',sel.value!=='其他');applyStrengthByExerciseLatest();});}
    function selectedExerciseName(){return $('strengthExerciseSelect').value==='其他' ? $('strengthExerciseOther').value.trim() : $('strengthExerciseSelect').value;}
    function applyInitialData(data){appState.initData=data;const cache=loadLocalCache();const latestRun=cache.run||data.latest.run||{};if(latestRun.minutes!==undefined&&latestRun.minutes!=='')$('runMinutes').value=latestRun.minutes;if(latestRun.speed!==undefined&&latestRun.speed!=='')$('runSpeed').value=latestRun.speed;if(latestRun.incline!==undefined&&latestRun.incline!=='')$('runIncline').value=latestRun.incline;if(latestRun.distance!==undefined&&latestRun.distance!=='')$('runDistance').value=latestRun.distance;$('sheetLink').href=data.sheetUrl||DEFAULT_SHEET_URL;setupExerciseSelect(data.exercises||[]);setRunDefaultsIfBlank();setStrengthDefaultsIfBlank();fillTrendExerciseOptions(data.strengthTrendExercises||[]);}
    function setRunDefaultsIfBlank(){if(!$('runMinutes').value)$('runMinutes').value='20';if(!$('runSpeed').value)$('runSpeed').value='5.0';if(!$('runIncline').value)$('runIncline').value='5.0';}
    function setStrengthDefaultsIfBlank(){if(!$('strengthExerciseSelect').value)$('strengthExerciseSelect').value='單雙槓舉腿架-舉腿';if(!$('strengthReps').value)$('strengthReps').value='20';if(!$('strengthSets').value)$('strengthSets').value='3';$('strengthOtherWrap').classList.toggle('hidden',$('strengthExerciseSelect').value!=='其他');}
    function applyStrengthByExerciseLatest(){const name=selectedExerciseName();if(!name||!appState.initData)return;const cache=loadLocalCache();const cachedMap=cache.strengthByExercise||{};const serverMap=appState.initData.latest.strengthByExercise||{};const data=cachedMap[name]||serverMap[name];if(!data)return;if(!$('strengthWeight').value)$('strengthWeight').value=data.weight??'';if(!$('strengthReps').value)$('strengthReps').value=data.reps??'';if(!$('strengthSeconds').value)$('strengthSeconds').value=data.seconds??'';if(!$('strengthSets').value)$('strengthSets').value=data.sets??'';hintText('strengthWeightHint',parseSmart($('strengthWeight').value,'weight'));}
    function normalizeDateForGas(v){return v?v.replace(/-/g,'/'):'';} function updateCacheRun(data){const cache=loadLocalCache();cache.run={minutes:data.minutes,speed:data.speed,incline:data.incline,distance:data.distance,timeSlot:data.timeSlot};saveLocalCache(cache);} function updateCacheStrength(data){const cache=loadLocalCache();cache.strengthByExercise=cache.strengthByExercise||{};cache.strengthByExercise[data.exercise]={weight:data.weight,reps:data.reps,seconds:data.seconds,sets:data.sets};saveLocalCache(cache);}
    function resetBodyForm(){appState.editing.body=null;$('cancelBodyEditBtn').classList.add('hidden');$('bodyDate').value=twDateInputValue();$('bodyTimeSlot').value=currentTimeSlot();$('bodyWeight').value='';$('bodyFat').value='';$('bodyWaist').value='';$('bodyNote').value='';$('bodyWeightHint').textContent='';$('bodyFatHint').textContent='';$('bodyWaistHint').textContent='';$('bodyWeight').focus();}
    function resetRunForm(keepLatest=true){appState.editing.run=null;$('cancelRunEditBtn').classList.add('hidden');$('runDate').value=twDateInputValue();$('runTimeSlot').value=currentTimeSlot();$('runNote').value='';if(!keepLatest){$('runMinutes').value='';$('runSpeed').value='';$('runIncline').value='';$('runDistance').value='';}else{const c=loadLocalCache().run||{};$('runMinutes').value=c.minutes??'20';$('runSpeed').value=c.speed??'5.0';$('runIncline').value=c.incline??'5.0';$('runDistance').value=c.distance??'';}}
    function resetStrengthForm(){appState.editing.strength=null;$('cancelStrengthEditBtn').classList.add('hidden');$('strengthDate').value=twDateInputValue();$('strengthTimeSlot').value=currentTimeSlot();$('strengthExerciseSelect').value='單雙槓舉腿架-舉腿';$('strengthExerciseOther').value='';$('strengthOtherWrap').classList.add('hidden');$('strengthWeight').value='';$('strengthReps').value='20';$('strengthSeconds').value='';$('strengthSets').value='3';$('strengthNote').value='';$('strengthWeightHint').textContent='';}
    async function saveBody(){try{showOverlay(true);$('saveBodyBtn').disabled=true;const payload={action:'saveBody',id:appState.editing.body?.id||'',date:normalizeDateForGas($('bodyDate').value),timeSlot:$('bodyTimeSlot').value,weight:parseSmart($('bodyWeight').value,'bodyWeight'),bodyFat:parseSmart($('bodyFat').value,'bodyFat'),waist:parseSmart($('bodyWaist').value,'waist'),note:$('bodyNote').value.trim()};const res=await postData(payload);resetBodyForm();await reloadAllAfterSave();showMsg(res.message);}catch(err){showMsg(err.message);}finally{showOverlay(false);$('saveBodyBtn').disabled=false;}}
    async function saveRun(){try{showOverlay(true);$('saveRunBtn').disabled=true;const payload={action:'saveRun',id:appState.editing.run?.id||'',date:normalizeDateForGas($('runDate').value),timeSlot:$('runTimeSlot').value,minutes:$('runMinutes').value,speed:$('runSpeed').value,incline:$('runIncline').value,distance:$('runDistance').value,note:$('runNote').value.trim()};const res=await postData(payload);updateCacheRun(res.data);resetRunForm(true);await reloadAllAfterSave();showMsg(res.message);}catch(err){showMsg(err.message);}finally{showOverlay(false);$('saveRunBtn').disabled=false;}}
    async function saveStrength(){try{showOverlay(true);$('saveStrengthBtn').disabled=true;const payload={action:'saveStrength',id:appState.editing.strength?.id||'',date:normalizeDateForGas($('strengthDate').value),timeSlot:$('strengthTimeSlot').value,exercise:selectedExerciseName(),weight:parseSmart($('strengthWeight').value,'weight'),reps:$('strengthReps').value,seconds:$('strengthSeconds').value,sets:$('strengthSets').value,note:$('strengthNote').value.trim()};const res=await postData(payload);updateCacheStrength(res.data);resetStrengthForm();await reloadAllAfterSave();showMsg(res.message);}catch(err){showMsg(err.message);}finally{showOverlay(false);$('saveStrengthBtn').disabled=false;}}
    async function loadRecentRecords(type){const res=await postData({action:'getRecentRecords',recordType:type,limit:10});if(type==='body')renderBodyRecords(res.rows||[]);if(type==='run')renderRunRecords(res.rows||[]);if(type==='strength')renderStrengthRecords(res.rows||[]);}
    function bindRecordActionButtons(){document.querySelectorAll('[data-action="edit"]').forEach(btn=>btn.onclick=()=>editRecord(btn.dataset.type,btn.dataset.id));document.querySelectorAll('[data-action="delete"]').forEach(btn=>btn.onclick=()=>deleteRecord(btn.dataset.type,btn.dataset.id));}
    function renderBodyRecords(rows){const box=$('bodyRecords');box.innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>';rows.forEach(row=>{const item=document.createElement('div');item.className='record-item';item.innerHTML=`<div class="record-item-title">${round1(row.weight)} kg</div><div class="record-item-meta">${formatDisplayDate(row.date)}｜${row.timeSlot}<br>體脂：${row.bodyFat===''?'—':round1(row.bodyFat)+'%'}｜腰圍：${row.waist===''?'—':round1(row.waist)}</div><div class="record-item-actions"><button class="tiny-btn" data-id="${row.id}" data-type="body" data-action="edit">修改</button><button class="tiny-btn" data-id="${row.id}" data-type="body" data-action="delete">刪除</button></div>`;box.appendChild(item);});bindRecordActionButtons();}
    function renderRunRecords(rows){const box=$('runRecords');box.innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>';rows.forEach(row=>{const item=document.createElement('div');item.className='record-item';item.innerHTML=`<div class="record-item-title">${row.minutes} 分鐘｜速度 ${round1(row.speed)}</div><div class="record-item-meta">${formatDisplayDate(row.date)}｜${row.timeSlot}<br>斜度：${round1(row.incline)}｜距離：${row.distance===''?'—':round1(row.distance)}</div><div class="record-item-actions"><button class="tiny-btn" data-id="${row.id}" data-type="run" data-action="edit">修改</button><button class="tiny-btn" data-id="${row.id}" data-type="run" data-action="delete">刪除</button></div>`;box.appendChild(item);});bindRecordActionButtons();}
    function renderStrengthRecords(rows){const box=$('strengthRecords');box.innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>';rows.forEach(row=>{const parts=[];if(row.weight!==''&&row.weight!==null)parts.push(`重量：${round1(row.weight)}`);if(row.reps!==''&&row.reps!==null)parts.push(`次數：${row.reps}`);if(row.seconds!==''&&row.seconds!==null)parts.push(`秒數：${row.seconds}`);parts.push(`組數：${row.sets}`);const item=document.createElement('div');item.className='record-item';item.innerHTML=`<div class="record-item-title">${row.exercise}</div><div class="record-item-meta">${formatDisplayDate(row.date)}｜${row.timeSlot}<br>${parts.join('｜')}</div><div class="record-item-actions"><button class="tiny-btn" data-id="${row.id}" data-type="strength" data-action="edit">修改</button><button class="tiny-btn" data-id="${row.id}" data-type="strength" data-action="delete">刪除</button></div>`;box.appendChild(item);});bindRecordActionButtons();}
    async function editRecord(type,id){const res=await postData({action:'getRecentRecords',recordType:type,limit:30});const row=(res.rows||[]).find(r=>String(r.id)===String(id));if(!row)return showMsg('找不到要修改的紀錄');if(type==='body'){appState.editing.body=row;$('bodyDate').value=formatDisplayDate(row.date).replace(/\//g,'-');$('bodyTimeSlot').value=row.timeSlot;$('bodyWeight').value=row.weight??'';$('bodyFat').value=row.bodyFat??'';$('bodyWaist').value=row.waist??'';$('bodyNote').value=row.note||'';hintText('bodyWeightHint',parseSmart($('bodyWeight').value,'bodyWeight'));hintText('bodyFatHint',parseSmart($('bodyFat').value,'bodyFat'));hintText('bodyWaistHint',parseSmart($('bodyWaist').value,'waist'));$('cancelBodyEditBtn').classList.remove('hidden');switchTab('body');} if(type==='run'){appState.editing.run=row;$('runDate').value=formatDisplayDate(row.date).replace(/\//g,'-');$('runTimeSlot').value=row.timeSlot;$('runMinutes').value=row.minutes??'';$('runSpeed').value=row.speed??'';$('runIncline').value=row.incline??'';$('runDistance').value=row.distance??'';$('runNote').value=row.note||'';$('cancelRunEditBtn').classList.remove('hidden');switchTab('run');} if(type==='strength'){appState.editing.strength=row;$('strengthDate').value=formatDisplayDate(row.date).replace(/\//g,'-');$('strengthTimeSlot').value=row.timeSlot;if(DEFAULT_EXERCISES.includes(row.exercise)){$('strengthExerciseSelect').value=row.exercise;$('strengthOtherWrap').classList.add('hidden');$('strengthExerciseOther').value='';}else{$('strengthExerciseSelect').value='其他';$('strengthOtherWrap').classList.remove('hidden');$('strengthExerciseOther').value=row.exercise||'';}$('strengthWeight').value=row.weight??'';$('strengthReps').value=row.reps??'';$('strengthSeconds').value=row.seconds??'';$('strengthSets').value=row.sets??'';$('strengthNote').value=row.note||'';hintText('strengthWeightHint',parseSmart($('strengthWeight').value,'weight'));$('cancelStrengthEditBtn').classList.remove('hidden');switchTab('strength');}}
    async function deleteRecord(type,id){if(!confirm('確定要刪除此筆紀錄嗎？'))return;try{await postData({action:'softDeleteRecord',recordType:type,id});await reloadAllAfterSave();showMsg('資料已刪除');}catch(err){showMsg(err.message);}}
    function switchTab(tab){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));$('panel-'+tab).classList.add('active');}
    async function reloadAllAfterSave(){const data=await postData({action:'init'});applyInitialData(data);await Promise.all([loadRecentRecords('body'),loadRecentRecords('run'),loadRecentRecords('strength'),loadStats(appState.currentRange)]);}
    function summaryCard(label,value){return `<div class="summary-card"><div class="label">${label}</div><div class="value">${value===''||value===null||value===undefined?'—':value}</div></div>`;}
    function buildDataset(label,data){return {label,data,tension:.25,spanGaps:true,pointRadius:3};}
    function makeLineChart(canvasId,labels,datasets){const ctx=$(canvasId).getContext('2d');if(appState.charts[canvasId])appState.charts[canvasId].destroy();appState.charts[canvasId]=new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},spanGaps:true,plugins:{legend:{display:true}},scales:{y:{beginAtZero:false}}}});}
    function renderBodySummary(body){$('bodySummary').innerHTML=[summaryCard('最近體重',body.latestWeight===''?'—':`${round1(body.latestWeight)} kg`),summaryCard('最近體脂',body.latestBodyFat===''?'—':`${round1(body.latestBodyFat)} %`),summaryCard('最近腰圍',body.latestWaist===''?'—':round1(body.latestWaist)),summaryCard('區間平均體重',body.avgWeight===''?'—':`${round1(body.avgWeight)} kg`),summaryCard('區間平均體脂',body.avgBodyFat===''?'—':`${round1(body.avgBodyFat)} %`),summaryCard('區間平均腰圍',body.avgWaist===''?'—':round1(body.avgWaist)),summaryCard('區間體重變化',body.changeWeight===''?'—':`${round1(body.changeWeight)} kg`)].join('');const labels=(body.trend||[]).map(r=>mmdd(r.date));const datasets=[];if($('chkBodyWeight').checked)datasets.push(buildDataset('體重',(body.trend||[]).map(r=>r.weight===''?null:Number(round1(r.weight)))));if($('chkBodyFat').checked)datasets.push(buildDataset('體脂肪',(body.trend||[]).map(r=>r.bodyFat===''?null:Number(round1(r.bodyFat)))));if($('chkBodyWaist').checked)datasets.push(buildDataset('腰圍',(body.trend||[]).map(r=>r.waist===''?null:Number(round1(r.waist)))));makeLineChart('bodyChart',labels,datasets);}
    function renderRunSummary(run){$('runSummary').innerHTML=[summaryCard('區間跑步次數',run.count??0),summaryCard('區間總分鐘數',run.totalMinutes===''?'—':round1(run.totalMinutes)),summaryCard('區間總距離',run.totalDistance===''?'—':round1(run.totalDistance)),summaryCard('區間平均每次分鐘數',run.avgMinutes===''?'—':round1(run.avgMinutes)),summaryCard('區間平均速度',run.avgSpeed===''?'—':round1(run.avgSpeed)),summaryCard('區間平均斜度',run.avgIncline===''?'—':round1(run.avgIncline)),summaryCard('區間平均每次距離',run.avgDistance===''?'—':round1(run.avgDistance))].join('');const labels=(run.trend||[]).map(r=>mmdd(r.date));const datasets=[];if($('chkRunMinutes').checked)datasets.push(buildDataset('分鐘數',(run.trend||[]).map(r=>r.minutes===''?null:Number(round1(r.minutes)))));if($('chkRunSpeed').checked)datasets.push(buildDataset('速度',(run.trend||[]).map(r=>r.speed===''?null:Number(round1(r.speed)))));if($('chkRunIncline').checked)datasets.push(buildDataset('斜度',(run.trend||[]).map(r=>r.incline===''?null:Number(round1(r.incline)))));if($('chkRunDistance').checked)datasets.push(buildDataset('距離',(run.trend||[]).map(r=>r.distance===''?null:Number(round1(r.distance)))));makeLineChart('runChart',labels,datasets);}
    function renderTable(elId,rows,type){const el=$(elId);if(!rows.length){el.innerHTML='<div class="hint">目前沒有資料</div>';return;}let html='<table><thead><tr><th>動作</th>';if(type==='weight')html+='<th>次數</th><th>平均重量</th><th>最大重量</th><th>平均次數</th><th>平均組數</th><th>總訓練量</th>';if(type==='count')html+='<th>次數</th><th>平均次數</th><th>平均組數</th><th>總次數</th>';if(type==='seconds')html+='<th>次數</th><th>平均秒數</th><th>平均組數</th><th>總秒數</th>';html+='</tr></thead><tbody>';rows.forEach(r=>{html+=`<tr><td>${r.exercise}</td>`;if(type==='weight')html+=`<td>${r.count}</td><td>${round1(r.avgWeight)}</td><td>${round1(r.maxWeight)}</td><td>${round1(r.avgReps)}</td><td>${round1(r.avgSets)}</td><td>${round1(r.totalVolume)}</td>`;if(type==='count')html+=`<td>${r.count}</td><td>${round1(r.avgReps)}</td><td>${round1(r.avgSets)}</td><td>${round1(r.totalCount)}</td>`;if(type==='seconds')html+=`<td>${r.count}</td><td>${round1(r.avgSeconds)}</td><td>${round1(r.avgSets)}</td><td>${round1(r.totalSeconds)}</td>`;html+='</tr>';});html+='</tbody></table>';el.innerHTML=html;}
    function fillTrendExerciseOptions(names){const sel=$('trendExercise');const u=[...new Set(names)];sel.innerHTML=u.map(n=>`<option value="${n}">${n}</option>`).join('');}
    function renderStrengthSummary(strength){$('strengthSummaryCards').innerHTML=[summaryCard('區間重訓總筆數',strength.count??0),summaryCard('重量型動作數',(strength.weightRows||[]).length),summaryCard('次數型動作數',(strength.countRows||[]).length),summaryCard('秒數型動作數',(strength.secondsRows||[]).length)].join('');renderTable('weightTable',strength.weightRows||[],'weight');renderTable('countTable',strength.countRows||[],'count');renderTable('secondsTable',strength.secondsRows||[],'seconds');const chosen=$('trendExercise').value||((strength.trendOptions||[])[0]||'');if(chosen&&(strength.trendMap||{})[chosen]){$('trendExercise').value=chosen;const rows=strength.trendMap[chosen];const labels=rows.map(r=>mmdd(r.date));const sets=[];if(rows.some(r=>r.weight!==''))sets.push(buildDataset('重量',rows.map(r=>r.weight===''?null:Number(round1(r.weight)))));if(rows.some(r=>r.reps!==''))sets.push(buildDataset('次數',rows.map(r=>r.reps===''?null:Number(r.reps))));if(rows.some(r=>r.seconds!==''))sets.push(buildDataset('秒數',rows.map(r=>r.seconds===''?null:Number(r.seconds))));if(rows.some(r=>r.sets!==''))sets.push(buildDataset('組數',rows.map(r=>r.sets===''?null:Number(r.sets))));makeLineChart('strengthTrendChart',labels,sets);}else{makeLineChart('strengthTrendChart',[],[]);}}
    async function loadStats(range){try{const res=await postData({action:'getStats',range});$('sheetLink').href=res.sheetUrl||DEFAULT_SHEET_URL;fillTrendExerciseOptions(res.strength?.trendOptions||[]);renderBodySummary(res.body||{});renderRunSummary(res.run||{});renderStrengthSummary(res.strength||{});}catch(err){showMsg(err.message);}}
    function bindChartChecks(){['chkBodyWeight','chkBodyFat','chkBodyWaist','chkRunMinutes','chkRunSpeed','chkRunIncline','chkRunDistance'].forEach(id=>$(id).addEventListener('change',()=>loadStats(appState.currentRange)));$('trendExercise').addEventListener('change',()=>loadStats(appState.currentRange));}
    async function initApp(){setDefaultDates();setupTabs();setupRangeButtons();setupHoldButtons();bindParseHints();bindChartChecks();$('saveBodyBtn').addEventListener('click',saveBody);$('saveRunBtn').addEventListener('click',saveRun);$('saveStrengthBtn').addEventListener('click',saveStrength);$('cancelBodyEditBtn').addEventListener('click',resetBodyForm);$('cancelRunEditBtn').addEventListener('click',()=>resetRunForm(false));$('cancelStrengthEditBtn').addEventListener('click',resetStrengthForm);const data=await postData({action:'init'});applyInitialData(data);await Promise.all([loadRecentRecords('body'),loadRecentRecords('run'),loadRecentRecords('strength'),loadStats(appState.currentRange)]);$('bodyWeight').focus();}
    initApp().catch(err=>{console.error(err);showMsg('初始化失敗，請確認 GAS 已重新部署');});
  </script>
</body>
</html>
