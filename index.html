<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>運動紀錄系統 v5</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--border:#dbe3ef;--radius:18px;--navH:78px}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:760px;margin:0 auto;padding:14px 14px calc(var(--navH) + 20px)}
    .top{position:sticky;top:0;z-index:20;background:rgba(245,247,251,.96);backdrop-filter:blur(10px);padding:8px 0 10px}
    h1{margin:0;font-size:22px}.ver{font-size:14px;color:var(--muted);margin-left:6px}
    .panel{display:none}.panel.active{display:block}
    .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-top:12px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
    .card h2{margin:0 0 12px;font-size:18px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:700}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:16px;background:#fff;min-height:48px}
    input[type="date"]{padding:10px 12px}
    .date-row{display:grid;grid-template-columns:minmax(0,.85fr) 140px;gap:10px;align-items:end}
    textarea{min-height:82px;resize:vertical}
    .num-wrap{display:grid;grid-template-columns:56px 1fr 56px;gap:8px;align-items:center}
    .num-btn{height:48px;border:0;border-radius:12px;background:#edf2ff;color:#23408e;font-size:24px;font-weight:700}
    .btn{border:0;border-radius:14px;padding:13px 14px;font-size:15px;font-weight:700;cursor:pointer}
    .primary{background:var(--primary);color:#fff}.secondary{background:#e8eef9;color:#24468f}.tiny{padding:8px 10px;font-size:13px;background:#eff4ff;color:#23408e;border-radius:10px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .hint{font-size:12px;color:var(--muted);line-height:1.5}
    .record-list{display:grid;gap:10px}.record-item{border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff}.record-item-title{font-weight:800;margin-bottom:6px}.record-item-meta{font-size:13px;color:var(--muted);line-height:1.6}.record-item-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.summary-card{background:#f8fbff;border:1px solid #e0e9f8;border-radius:14px;padding:12px}.summary-card .label{font-size:12px;color:var(--muted);margin-bottom:6px}.summary-card .value{font-size:24px;font-weight:800}
    .range-btns{display:flex;gap:8px;flex-wrap:wrap}.range-btn{border:0;padding:10px 12px;border-radius:999px;background:#e7eefc;color:#24468f;font-weight:700}.range-btn.active{background:var(--primary);color:#fff}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);height:var(--navH);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:env(safe-area-inset-bottom)}
    .tab-btn{border:0;background:transparent;color:#6b7280;font-size:13px;font-weight:700}.tab-btn.active{color:var(--primary)}
    .footer-link{text-align:right;margin-top:10px}.footer-link a{font-size:12px;color:var(--muted);text-decoration:none}
    .overlay{position:fixed;inset:0;background:rgba(17,24,39,.35);display:none;align-items:center;justify-content:center;z-index:50}.overlay.show{display:flex}.overlay-box{background:#fff;border-radius:18px;padding:20px 24px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,.18)}
    .msg{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:rgba(17,24,39,.92);color:#fff;padding:12px 16px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:60;max-width:calc(100% - 24px)}.msg.show{opacity:1}
    .hidden{display:none!important}
    canvas{width:100%!important;max-height:260px}
    @media (max-width:560px){.grid2,.summary-grid{grid-template-columns:1fr}.date-row{grid-template-columns:minmax(0,.85fr) 110px}.app{padding-left:10px;padding-right:10px}.card{padding:14px}}
  </style>
</head>
<body>
<div class="app">
  <div class="top"><h1>運動紀錄系統 <span class="ver">v5</span></h1></div>

  <section id="panel-body" class="panel active">
    <div class="card">
      <h2>體態紀錄</h2>
      <div class="date-row">
        <div class="field"><label>日期</label><input type="date" id="bodyDate"></div>
        <div class="field"><label>時段</label><select id="bodyTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div>
      </div>
      <div class="field"><label>體重（必填）</label><input inputmode="decimal" id="bodyWeight"></div>
      <div class="field"><label>體脂肪</label><input inputmode="decimal" id="bodyFat"></div>
      <div class="field"><label>腰圍</label><input inputmode="decimal" id="bodyWaist"></div>
      <div class="field"><label>備註</label><textarea id="bodyNote" placeholder="可空白"></textarea></div>
      <div class="actions"><button class="btn primary" id="saveBodyBtn">儲存體態紀錄</button><button class="btn secondary hidden" id="cancelBodyEditBtn">取消修改</button></div>
    </div>
    <div class="card"><h2>最近體態紀錄</h2><div id="bodyRecords" class="record-list"></div></div>
  </section>

  <section id="panel-run" class="panel">
    <div class="card">
      <h2>跑步紀錄</h2>
      <div class="date-row">
        <div class="field"><label>日期</label><input type="date" id="runDate"></div>
        <div class="field"><label>時段</label><select id="runTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div>
      </div>
      <div class="field"><label>跑步分鐘數</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runMinutes" data-step="-1">−</button><input inputmode="numeric" id="runMinutes"><button class="num-btn hold-btn" data-target="runMinutes" data-step="1">＋</button></div></div>
      <div class="field"><label>跑步機速度（km/h）</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runSpeed" data-step="-0.1">−</button><input inputmode="decimal" id="runSpeed"><button class="num-btn hold-btn" data-target="runSpeed" data-step="0.1">＋</button></div></div>
      <div class="field"><label>斜度</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="runIncline" data-step="-0.5">−</button><input inputmode="decimal" id="runIncline"><button class="num-btn hold-btn" data-target="runIncline" data-step="0.5">＋</button></div></div>
      <div class="field"><label>距離（自動推算，可手動改）</label><input inputmode="decimal" id="runDistance"></div>
      <div class="field"><label>備註</label><textarea id="runNote" placeholder="可空白"></textarea></div>
      <div class="actions"><button class="btn primary" id="saveRunBtn">儲存跑步紀錄</button><button class="btn secondary hidden" id="cancelRunEditBtn">取消修改</button></div>
      <div class="hint">頁面開啟時會先套入最近一次跑步資料。</div>
    </div>
    <div class="card"><h2>最近跑步紀錄</h2><div id="runRecords" class="record-list"></div></div>
  </section>

  <section id="panel-strength" class="panel">
    <div class="card">
      <h2>重訓紀錄</h2>
      <div class="date-row">
        <div class="field"><label>日期</label><input type="date" id="strengthDate"></div>
        <div class="field"><label>時段</label><select id="strengthTimeSlot"><option>上午</option><option>下午</option><option>晚上</option></select></div>
      </div>
      <div class="field"><label>動作名稱</label><input list="exerciseOptions" id="strengthExercise"><datalist id="exerciseOptions"></datalist></div>
      <div class="field"><label>記錄方式</label><select id="strengthMode"><option value="weight">重量</option><option value="count">次數</option><option value="seconds">秒數</option></select></div>
      <div class="field" id="strengthWeightWrap"><label id="strengthWeightLabel">重量</label><input inputmode="decimal" id="strengthWeight"></div>
      <div class="field"><label id="strengthRepsLabel">每組次數</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="strengthReps" data-step="-1">−</button><input inputmode="numeric" id="strengthReps"><button class="num-btn hold-btn" data-target="strengthReps" data-step="1">＋</button></div></div>
      <div class="field"><label id="strengthSetsLabel">組數</label><div class="num-wrap"><button class="num-btn hold-btn" data-target="strengthSets" data-step="-1">−</button><input inputmode="numeric" id="strengthSets"><button class="num-btn hold-btn" data-target="strengthSets" data-step="1">＋</button></div></div>
      <div class="field"><label>備註</label><textarea id="strengthNote" placeholder="可空白"></textarea></div>
      <div class="actions"><button class="btn primary" id="saveStrengthBtn">儲存重訓紀錄</button><button class="btn secondary hidden" id="cancelStrengthEditBtn">取消修改</button></div>
      <div class="hint">選定動作後，會帶入同一動作最近一次資料。</div>
    </div>
    <div class="card"><h2>最近重訓紀錄</h2><div id="strengthRecords" class="record-list"></div></div>
  </section>

  <section id="panel-stats" class="panel">
    <div class="card"><h2>統計摘要</h2><div class="range-btns"><button class="range-btn active" data-range="1m">近1個月</button><button class="range-btn" data-range="3m">近3個月</button><button class="range-btn" data-range="6m">近6個月</button><button class="range-btn" data-range="1y">近1年</button><button class="range-btn" data-range="all">全部</button></div></div>
    <div class="card"><h2>體態</h2><div id="bodySummary" class="summary-grid"></div><canvas id="bodyChart"></canvas></div>
    <div class="card"><h2>跑步</h2><div id="runSummary" class="summary-grid"></div><canvas id="runChart"></canvas></div>
    <div class="card"><h2>重訓</h2><div id="strengthSummary"></div><canvas id="strengthChart"></canvas></div>
    <div class="footer-link"><a id="sheetLink" href="#" target="_blank" rel="noopener">後台 Sheet</a></div>
  </section>
</div>

<nav class="bottom-nav">
  <button class="tab-btn active" data-tab="body">體重</button>
  <button class="tab-btn" data-tab="run">跑步</button>
  <button class="tab-btn" data-tab="strength">重訓</button>
  <button class="tab-btn" data-tab="stats">統計</button>
</nav>

<div id="overlay" class="overlay"><div class="overlay-box">儲存中...請稍後</div></div>
<div id="msg" class="msg"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwMDGa7Q_oF8YokYuo4ItF4XGUknCGqeXpq-ttDAbLnPUC0t7BbAHkHFhj-4-SpXdJtCA/exec';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1EqAbQKvkHtlGk81AlXaXHrfmsf0cHV3v2jZ_erTF1sA/edit?gid=1609334560#gid=1609334560';
const appState={initData:null,currentRange:'1m',editing:{body:null,run:null,strength:null},charts:{}};
const $=id=>document.getElementById(id);
const cacheKey='sports_records_v5_cache';

function getTWNow(){
  const parts = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',hour12:false}).formatToParts(new Date());
  const map={}; parts.forEach(p=>{if(p.type!=='literal') map[p.type]=p.value;});
  return map;
}
const todayInputValue=()=>{const p=getTWNow(); return `${p.year}-${p.month}-${p.day}`;};
const currentTimeSlot=()=>{const h=Number(getTWNow().hour); if(h>=5&&h<12)return '上午'; if(h>=12&&h<18)return '下午'; return '晚上';};

function formatDisplayDate(v){
  if(!v) return '';
  if(typeof v==='string' && /^\d{4}\/\d{2}\/\d{2}$/.test(v)) return v;
  const d = new Date(v);
  if (!isNaN(d)) {
    const parts = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);
    const m={}; parts.forEach(p=>{if(p.type!=='literal') m[p.type]=p.value;});
    return `${m.year}/${m.month}/${m.day}`;
  }
  return String(v).replace(/-/g,'/').slice(0,10);
}
function shortDisplayDate(v){const s=formatDisplayDate(v); return s ? s.slice(5) : '';}
function showMsg(t){const el=$('msg');el.textContent=t;el.classList.add('show');clearTimeout(showMsg.t);showMsg.t=setTimeout(()=>el.classList.remove('show'),1800)}
function showOverlay(v){$('overlay').classList.toggle('show',v)}
async function postData(payload){const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)}); const data=await res.json(); if(!data.ok) throw new Error(data.message||'發生錯誤'); return data;}
function loadCache(){try{return JSON.parse(localStorage.getItem(cacheKey)||'{}')}catch{return {}}}
function saveCache(c){localStorage.setItem(cacheKey,JSON.stringify(c))}
function smartParse(value,mode){const str=String(value??'').trim(); if(!str)return ''; if(str.includes('.')) return Number(str); if(!/^\d+$/.test(str)) return Number(str);
  if(mode==='bodyWeight'||mode==='waist'){ if(str.length<=2) return Number(str); if(str.length===3&&str.startsWith('1')) return Number(str); return Number(str)/10; }
  if(mode==='bodyFat'||mode==='weight'){ if(str.length<=2) return Number(str); return Number(str)/10; }
  return Number(str);
}
function bindTabs(){document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)))}
function switchTab(tab){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));$('panel-'+tab).classList.add('active'); if(tab==='stats') loadStats(appState.currentRange);}
function setupRangeButtons(){document.querySelectorAll('.range-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');appState.currentRange=btn.dataset.range;loadStats(btn.dataset.range)}))}
function setupHoldButtons(){document.querySelectorAll('.hold-btn').forEach(btn=>{let iv=null; const apply=()=>adjustInput(btn.dataset.target,Number(btn.dataset.step)); const start=e=>{e.preventDefault(); apply(); iv=setInterval(apply,120)}; const stop=()=>{if(iv)clearInterval(iv); iv=null}; btn.addEventListener('mousedown',start); btn.addEventListener('touchstart',start,{passive:false}); ['mouseup','mouseleave','touchend','touchcancel'].forEach(evt=>btn.addEventListener(evt,stop));})}
function adjustInput(id,step){const input=$(id); let v=Number(input.value||0); if(!Number.isFinite(v)) v=0; v+=step; if(v<0) v=0; const d=String(step).includes('.')?String(step).split('.')[1].length:0; input.value=v.toFixed(d); if(id==='runMinutes'||id==='runSpeed') autoCalcDistance();}
function autoCalcDistance(){const m=Number($('runMinutes').value||0), s=Number($('runSpeed').value||0); if(Number.isFinite(m)&&Number.isFinite(s)&&m>0&&s>0){ $('runDistance').value=(s*m/60).toFixed(1); }}
function setDefaults(){['bodyDate','runDate','strengthDate'].forEach(id=>$(id).value=todayInputValue()); ['bodyTimeSlot','runTimeSlot','strengthTimeSlot'].forEach(id=>$(id).value=currentTimeSlot()); $('sheetLink').href=SHEET_URL;}
function renderExerciseOptions(exercises){const dl=$('exerciseOptions'); dl.innerHTML=''; (exercises||[]).forEach(ex=>{const op=document.createElement('option'); op.value=ex.name; dl.appendChild(op);});}
function updateStrengthModeUI(){
  const mode=$('strengthMode').value;
  $('strengthWeightWrap').classList.toggle('hidden', mode!=='weight');
  $('strengthRepsLabel').textContent = mode==='weight' ? '每組次數' : (mode==='count' ? '次數' : '秒數');
  $('strengthSetsLabel').textContent = mode==='weight' ? '組數' : '組數（可空白）';
}
function applyInitialData(data){appState.initData=data; const cache=loadCache();
  $('bodyWeight').value=''; $('bodyFat').value=''; $('bodyWaist').value='';
  const latestRun=cache.run||data.latest?.run||{}; if(latestRun.minutes!=='') $('runMinutes').value=latestRun.minutes??''; if(latestRun.speed!=='') $('runSpeed').value=latestRun.speed??''; if(latestRun.incline!=='') $('runIncline').value=latestRun.incline??''; if(latestRun.distance!=='') $('runDistance').value=latestRun.distance??'';
  renderExerciseOptions(data.exercises||[]);
}
function setupStrengthAutofill(){['change','blur'].forEach(evt=>$('strengthExercise').addEventListener(evt,()=>{const name=$('strengthExercise').value.trim(); if(!name||!appState.initData)return; const cache=loadCache(); const data=(cache.strengthByExercise||{})[name] || (appState.initData.latest?.strengthByExercise||{})[name]; if(!data) return; if(!appState.editing.strength){ $('strengthMode').value=data.mode||'weight'; updateStrengthModeUI(); $('strengthWeight').value=data.weight??''; $('strengthReps').value=data.reps??''; $('strengthSets').value=data.sets??''; } }))}

function bindButtons(){
  $('saveBodyBtn').onclick=saveBody; $('saveRunBtn').onclick=saveRun; $('saveStrengthBtn').onclick=saveStrength;
  $('cancelBodyEditBtn').onclick=()=>resetBody(false); $('cancelRunEditBtn').onclick=()=>resetRun(false); $('cancelStrengthEditBtn').onclick=()=>resetStrength();
  $('runMinutes').addEventListener('input',autoCalcDistance); $('runSpeed').addEventListener('input',autoCalcDistance);
  $('strengthMode').addEventListener('change',updateStrengthModeUI);
}
async function saveBody(){try{showOverlay(true); const payload={action:'saveBody',id:appState.editing.body?.id||'',date:$('bodyDate').value.replace(/-/g,'/'),timeSlot:$('bodyTimeSlot').value,weight:smartParse($('bodyWeight').value,'bodyWeight'),bodyFat:smartParse($('bodyFat').value,'bodyFat'),waist:smartParse($('bodyWaist').value,'waist'),note:$('bodyNote').value.trim()}; const res=await postData(payload); const c=loadCache(); c.body={}; saveCache(c); resetBody(true); await reloadAll(); showMsg(res.message);}catch(err){showMsg(err.message)}finally{showOverlay(false)}}
async function saveRun(){try{showOverlay(true); const payload={action:'saveRun',id:appState.editing.run?.id||'',date:$('runDate').value.replace(/-/g,'/'),timeSlot:$('runTimeSlot').value,minutes:$('runMinutes').value,speed:$('runSpeed').value,incline:$('runIncline').value,distance:$('runDistance').value,note:$('runNote').value.trim()}; const res=await postData(payload); const c=loadCache(); c.run={minutes:res.data.minutes,speed:res.data.speed,incline:res.data.incline,distance:res.data.distance}; saveCache(c); resetRun(true); await reloadAll(); showMsg(res.message);}catch(err){showMsg(err.message)}finally{showOverlay(false)}}
async function saveStrength(){try{showOverlay(true); const mode=$('strengthMode').value; const payload={action:'saveStrength',id:appState.editing.strength?.id||'',date:$('strengthDate').value.replace(/-/g,'/'),timeSlot:$('strengthTimeSlot').value,exercise:$('strengthExercise').value.trim(),mode:mode,weight:mode==='weight'?smartParse($('strengthWeight').value,'weight'):'',reps:$('strengthReps').value,sets:$('strengthSets').value,note:$('strengthNote').value.trim()}; const res=await postData(payload); const c=loadCache(); c.strengthByExercise=c.strengthByExercise||{}; c.strengthByExercise[res.data.exercise]={mode:res.data.mode,weight:res.data.weight,reps:res.data.reps,sets:res.data.sets}; saveCache(c); resetStrength(); await reloadAll(); showMsg(res.message);}catch(err){showMsg(err.message)}finally{showOverlay(false)}}
function resetBody(){appState.editing.body=null; $('cancelBodyEditBtn').classList.add('hidden'); $('bodyDate').value=todayInputValue(); $('bodyTimeSlot').value=currentTimeSlot(); $('bodyWeight').value=''; $('bodyFat').value=''; $('bodyWaist').value=''; $('bodyNote').value='';}
function resetRun(keepLatest=true){appState.editing.run=null; $('cancelRunEditBtn').classList.add('hidden'); $('runDate').value=todayInputValue(); $('runTimeSlot').value=currentTimeSlot(); $('runNote').value=''; if(!keepLatest){$('runMinutes').value='';$('runSpeed').value='';$('runIncline').value='';$('runDistance').value=''; return;} const c=loadCache().run||{}; $('runMinutes').value=c.minutes??''; $('runSpeed').value=c.speed??''; $('runIncline').value=c.incline??''; $('runDistance').value=c.distance??'';}
function resetStrength(){appState.editing.strength=null; $('cancelStrengthEditBtn').classList.add('hidden'); $('strengthDate').value=todayInputValue(); $('strengthTimeSlot').value=currentTimeSlot(); $('strengthExercise').value=''; $('strengthMode').value='weight'; updateStrengthModeUI(); $('strengthWeight').value=''; $('strengthReps').value=''; $('strengthSets').value=''; $('strengthNote').value='';}
async function loadRecentRecords(type){const res=await postData({action:'getRecentRecords',recordType:type,limit:10}); if(type==='body') renderBodyRecords(res.rows||[]); if(type==='run') renderRunRecords(res.rows||[]); if(type==='strength') renderStrengthRecords(res.rows||[]);}
function itemButtons(type,id){return `<div class="record-item-actions"><button class="tiny" onclick="editRecord('${type}','${id}')">修改</button><button class="tiny" onclick="deleteRecord('${type}','${id}')">刪除</button></div>`}
function renderBodyRecords(rows){$('bodyRecords').innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>'; rows.forEach(r=>{$('bodyRecords').insertAdjacentHTML('beforeend',`<div class="record-item"><div class="record-item-title">${r.weight??''} kg</div><div class="record-item-meta">${formatDisplayDate(r.date)}｜${r.timeSlot}<br>體脂：${r.bodyFat??'—'}%｜腰圍：${r.waist??'—'}</div>${itemButtons('body',r.id)}</div>`);});}
function renderRunRecords(rows){$('runRecords').innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>'; rows.forEach(r=>{$('runRecords').insertAdjacentHTML('beforeend',`<div class="record-item"><div class="record-item-title">${r.minutes} 分鐘｜速度 ${r.speed}</div><div class="record-item-meta">${formatDisplayDate(r.date)}｜${r.timeSlot}<br>斜度：${r.incline}｜距離：${r.distance??''}</div>${itemButtons('run',r.id)}</div>`);});}
function modeText(m){return m==='count'?'次數':(m==='seconds'?'秒數':'重量')}
function renderStrengthRecords(rows){$('strengthRecords').innerHTML=rows.length?'':'<div class="hint">目前沒有資料</div>'; rows.forEach(r=>{let line=''; if(r.mode==='weight'){ line=`重量：${r.weight??'—'}｜每組次數：${r.reps??'—'}｜組數：${r.sets??'—'}`; } else if(r.mode==='seconds'){ line=`秒數：${r.reps??'—'}｜組數：${r.sets??'—'}`; } else { line=`次數：${r.reps??'—'}｜組數：${r.sets??'—'}`; } $('strengthRecords').insertAdjacentHTML('beforeend',`<div class="record-item"><div class="record-item-title">${r.exercise}（${modeText(r.mode)}）</div><div class="record-item-meta">${formatDisplayDate(r.date)}｜${r.timeSlot}<br>${line}</div>${itemButtons('strength',r.id)}</div>`);});}
async function editRecord(type,id){
  const res=await postData({action:'getRecentRecords',recordType:type,limit:30});
  const row=(res.rows||[]).find(r=>String(r.id)===String(id));
  if(!row) return showMsg('找不到要修改的紀錄');
  if(type==='body'){appState.editing.body=row; $('bodyDate').value=formatDisplayDate(row.date).replace(/\//g,'-'); $('bodyTimeSlot').value=row.timeSlot; $('bodyWeight').value=row.weight??''; $('bodyFat').value=row.bodyFat??''; $('bodyWaist').value=row.waist??''; $('bodyNote').value=row.note||''; $('cancelBodyEditBtn').classList.remove('hidden'); switchTab('body');}
  if(type==='run'){appState.editing.run=row; $('runDate').value=formatDisplayDate(row.date).replace(/\//g,'-'); $('runTimeSlot').value=row.timeSlot; $('runMinutes').value=row.minutes??''; $('runSpeed').value=row.speed??''; $('runIncline').value=row.incline??''; $('runDistance').value=row.distance??''; $('runNote').value=row.note||''; $('cancelRunEditBtn').classList.remove('hidden'); switchTab('run');}
  if(type==='strength'){appState.editing.strength=row; $('strengthDate').value=formatDisplayDate(row.date).replace(/\//g,'-'); $('strengthTimeSlot').value=row.timeSlot; $('strengthExercise').value=row.exercise||''; $('strengthMode').value=row.mode||'weight'; updateStrengthModeUI(); $('strengthWeight').value=row.weight??''; $('strengthReps').value=row.reps??''; $('strengthSets').value=row.sets??''; $('strengthNote').value=row.note||''; $('cancelStrengthEditBtn').classList.remove('hidden'); switchTab('strength');}
}
async function deleteRecord(type,id){if(!confirm('確定要刪除此筆紀錄嗎？')) return; try{showOverlay(true); await postData({action:'softDeleteRecord',recordType:type,id}); await reloadAll(); showMsg('資料已刪除');}catch(err){showMsg(err.message)}finally{showOverlay(false)}}
async function reloadAll(){const data=await postData({action:'init'}); applyInitialData(data); await Promise.all([loadRecentRecords('body'),loadRecentRecords('run'),loadRecentRecords('strength'),loadStats(appState.currentRange)])}
function card(label,value){return `<div class="summary-card"><div class="label">${label}</div><div class="value">${value===''||value==null?'—':value}</div></div>`}
async function loadStats(range){
  try{
    const res=await postData({action:'getStats',range});
    $('bodySummary').innerHTML=[card('最近體重',res.body.latestWeight!==''?`${res.body.latestWeight} kg`:'—'),card('最近體脂',res.body.latestBodyFat!==''?`${res.body.latestBodyFat} %`:'—'),card('最近腰圍',res.body.latestWaist),card('平均體重',res.body.avgWeight!==''?`${res.body.avgWeight} kg`:'—'),card('平均體脂',res.body.avgBodyFat!==''?`${res.body.avgBodyFat} %`:'—'),card('體重變化',res.body.changeWeight!==''?`${res.body.changeWeight} kg`:'—')].join('');
    $('runSummary').innerHTML=[card('跑步次數',res.run.count??0),card('總分鐘數',res.run.totalMinutes),card('平均每次',res.run.avgMinutes!==''?`${res.run.avgMinutes} 分`:'—'),card('平均速度',res.run.avgSpeed),card('平均斜度',res.run.avgIncline),card('總距離',res.run.totalDistance)].join('');
    const rows=res.strength.exercises||[];
    $('strengthSummary').innerHTML=rows.length?rows.map(r=>{
      if(r.mode==='weight') return `<div class="record-item" style="margin-bottom:10px"><div class="record-item-title">${r.exercise}（重量）</div><div class="record-item-meta">次數：${r.count} 次<br>平均重量：${r.avgWeight}<br>最大重量：${r.maxWeight}<br>平均次數：${r.avgReps}<br>平均組數：${r.avgSets}<br>總訓練量：${r.totalVolume}</div></div>`;
      if(r.mode==='seconds') return `<div class="record-item" style="margin-bottom:10px"><div class="record-item-title">${r.exercise}（秒數）</div><div class="record-item-meta">次數：${r.count} 次<br>平均秒數：${r.avgSeconds}<br>平均組數：${r.avgSets}<br>總秒數：${r.totalSeconds}</div></div>`;
      return `<div class="record-item" style="margin-bottom:10px"><div class="record-item-title">${r.exercise}（次數）</div><div class="record-item-meta">次數：${r.count} 次<br>平均次數：${r.avgCount}<br>平均組數：${r.avgSets}<br>總次數：${r.totalCount}</div></div>`;
    }).join(''):'<div class="hint">目前沒有資料</div>';
    renderCharts(res);
  }catch(err){showMsg(err.message)}
}
function upsertChart(key,canvasId,cfg){if(appState.charts[key]) appState.charts[key].destroy(); appState.charts[key]=new Chart($(canvasId),cfg)}
function renderCharts(res){
  const bt=res.body.trend||[];
  upsertChart('body','bodyChart',{type:'line',data:{labels:bt.map(x=>shortDisplayDate(x.date)),datasets:[{label:'體重',data:bt.map(x=>x.weight??null),spanGaps:true,tension:.25},{label:'體脂肪',data:bt.map(x=>x.bodyFat===''?null:x.bodyFat),spanGaps:true,tension:.25},{label:'腰圍',data:bt.map(x=>x.waist===''?null:x.waist),spanGaps:true,tension:.25}]},options:{responsive:true,maintainAspectRatio:false}});
  const rt=res.run.trend||[];
  upsertChart('run','runChart',{type:'line',data:{labels:rt.map(x=>shortDisplayDate(x.date)),datasets:[{label:'分鐘數',data:rt.map(x=>x.minutes??null),spanGaps:true,tension:.25},{label:'速度',data:rt.map(x=>x.speed??null),spanGaps:true,tension:.25},{label:'斜度',data:rt.map(x=>x.incline??null),spanGaps:true,tension:.25},{label:'距離',data:rt.map(x=>x.distance??null),spanGaps:true,tension:.25}]},options:{responsive:true,maintainAspectRatio:false}});
  const sr=res.strength.exercises||[];
  upsertChart('strength','strengthChart',{type:'bar',data:{labels:sr.map(x=>x.exercise),datasets:[{label:'統計值',data:sr.map(x=>x.chartValue??0)}]},options:{responsive:true,maintainAspectRatio:false}});
}
async function initApp(){setDefaults(); bindTabs(); setupRangeButtons(); setupHoldButtons(); setupStrengthAutofill(); bindButtons(); updateStrengthModeUI(); const data=await postData({action:'init'}); applyInitialData(data); await Promise.all([loadRecentRecords('body'),loadRecentRecords('run'),loadRecentRecords('strength')]);}
initApp().catch(err=>{console.error(err);showMsg('初始化失敗，請先確認 GAS 與部署設定')});
</script>
</body>
</html>
